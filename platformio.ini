; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<i2c_scan.cpp>
lib_deps =
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BusIO@^1.17.4
	adafruit/Adafruit HMC5883 Unified@^1.2.4
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D USER_SETUP_LOADED=1
	-D ST7735_DRIVER=1
	-D TFT_WIDTH=128
	-D TFT_HEIGHT=160
	-D TFT_MOSI=8
	-D TFT_SCLK=9
	-D TFT_CS=2
	-D TFT_DC=1
	-D TFT_RST=0
	-D TFT_MISO=-1
	-D SPI_FREQUENCY=27000000
	-D TFT_SPI_MODE=0
	-D I2C_SDA=6
	-D I2C_SCL=7


[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = +<*> -<i2c_scan.cpp>
lib_deps =
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BusIO@^1.17.4
	adafruit/Adafruit HMC5883 Unified@^1.2.4
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
; Forzar el tamaño de flash a 4MB
board_upload.flash_size = 4MB

; EL TRUCO CLAVE: Cambiar el tipo de memoria para evitar el reinicio
board_build.arduino.memory_type = qio_qspi 

; Asegurar que las particiones caben en 4MB
board_build.partitions = default.csv

; Opciones de compilación para activar el Monitor Serie por el USB nativo
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D USER_SETUP_LOADED=1
	-D ST7735_DRIVER=1
	-D TFT_WIDTH=128
	-D TFT_HEIGHT=160
	-D TFT_MOSI=3
	-D TFT_SCLK=4
	-D TFT_CS=11
	-D TFT_DC=10
	-D TFT_RST=9
	-D TFT_MISO=-1
	-D SPI_FREQUENCY=27000000
	-D TFT_SPI_MODE=0
	-D I2C_SDA=1
	-D I2C_SCL=2
monitor_speed = 115200

[env:i2c_scan]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D I2C_SDA=6
	-D I2C_SCL=7
build_src_filter = -<*> +<i2c_scan.cpp>


[env:i2c_scan-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default.csv
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D I2C_SDA=1
	-D I2C_SCL=2
build_src_filter = -<*> +<i2c_scan.cpp>